<!DOCTYPE html>
<html>
<head>
  <title>Quiz - AI Learning Portal</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .quiz-page-container {
      max-width: 800px;
      margin: 0 auto;
      padding: 20px;
    }
    .quiz-header {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 20px;
      border-radius: 10px;
      margin-bottom: 20px;
      text-align: center;
    }
    .quiz-question {
      background: white;
      padding: 20px;
      margin-bottom: 15px;
      border-radius: 8px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    .quiz-option {
      display: block;
      padding: 12px 15px;
      margin: 8px 0;
      background: #f5f5f5;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .quiz-option:hover {
      background: #e0e0e0;
    }
    .quiz-option input[type="radio"] {
      margin-right: 10px;
    }
    .submit-btn {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      padding: 15px 40px;
      border: none;
      border-radius: 25px;
      font-size: 18px;
      cursor: pointer;
      margin-top: 20px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }
    .submit-btn:hover {
      transform: scale(1.05);
    }
    .back-btn {
      background: #6c757d;
      color: white;
      padding: 10px 25px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>

<div class="quiz-page-container">
  <button class="back-btn" onclick="goBack()">← Back to Dashboard</button>
  
  <div class="quiz-header">
    <h1>📝 Quiz: <span id="courseTitle"></span></h1>
    <p>Select the correct answer for each question</p>
  </div>

  <div id="quizContent"></div>
  
  <div id="quizResult"></div>
  
  <button class="submit-btn" onclick="submitQuiz()" style="display: none;" id="submitBtn">Submit Quiz</button>
</div>

<script src="script.js"></script>
<script>
  // Load quiz questions based on URL parameter
  window.onload = function() {
    // Check if user is logged in
    if (!isLoggedIn()) {
      alert("Please login first to access the quiz!");
      window.location.href = "index.html";
      return;
    }
    
    const urlParams = new URLSearchParams(window.location.search);
    const course = urlParams.get('course');
    
    if (course && quizQuestions[course]) {
      document.getElementById('courseTitle').textContent = course;
      loadQuizPage(course);
    } else {
      document.getElementById('quizContent').innerHTML = '<p>No course selected. Please go back and select a course.</p>';
    }
  };
  
  function loadQuizPage(course) {
    const questions = quizQuestions[course];
    let quizHTML = "";
    
    questions.forEach((q, index) => {
      quizHTML += "<div class='quiz-question'>";
      quizHTML += "<p><strong>Q" + (index + 1) + ":</strong> " + q.question + "</p>";
      
      q.options.forEach((option, optIndex) => {
        quizHTML += "<label class='quiz-option'>";
        quizHTML += "<input type='radio' name='question" + index + "' value='" + optIndex + "'>";
        quizHTML += option;
        quizHTML += "</label>";
      });
      
      quizHTML += "</div>";
    });
    
    document.getElementById('quizContent').innerHTML = quizHTML;
    document.getElementById('submitBtn').style.display = 'block';
  }
  
  function submitQuiz() {
    const urlParams = new URLSearchParams(window.location.search);
    const course = urlParams.get('course');
    const questions = quizQuestions[course];
    let correct = 0;
    
    questions.forEach((q, index) => {
      const selected = document.querySelector('input[name="question' + index + '"]:checked');
      if (selected) {
        userAnswers[index] = parseInt(selected.value);
        if (userAnswers[index] === q.answer) {
          correct++;
        }
      } else {
        userAnswers[index] = -1;
      }
    });
    
    const score = Math.round((correct / questions.length) * 100);
    
    let message = "";
    if (score >= 75) {
      message = "🎉 Excellent Performance! Keep Learning!";
    } else if (score >= 50) {
      message = "👍 Good Job! Practice More!";
    } else {
      message = "💪 Don't Give Up! You Can Improve!";
    }
    
    const quizResult = document.getElementById('quizResult');
    quizResult.innerHTML = "<div class='quiz-question' style='text-align: center;'>" +
      "<h2>Your Score: " + score + "% (" + correct + "/" + questions.length + ")</h2>" +
      "<p style='font-size: 20px;'>" + message + "</p>" +
      "</div>";
    
    document.getElementById('submitBtn').style.display = 'none';
  }
  
  function goBack() {
    window.location.href = 'dashboard.html';
  }
</script>

</body>
</html>
